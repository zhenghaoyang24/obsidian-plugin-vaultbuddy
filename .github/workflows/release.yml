name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # 推送纯数字版本号 tag 时自动发布，例如 1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.4). Must match an existing tag."
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # 从 tag 名称获取版本号（tag 本身不带 v）
            VERSION="${GITHUB_REF_NAME}"
          else
            # 手动触发：使用输入版本号
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" --json tagName &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip if already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.version }} already exists, skipped"

      - name: Build plugin
        if: steps.check.outputs.exists == 'false'
        run: pnpm build

      - name: Attest build provenance
        if: steps.check.outputs.exists == 'false'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            build/main.js
            build/styles.css
            build/manifest.json

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            build/main.js
            build/styles.css
            build/manifest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
